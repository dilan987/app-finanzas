version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finanzas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finanzas_pass_dev}
      POSTGRES_DB: ${POSTGRES_DB:-finanzas_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-finanzas_user}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finanzas-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finanzas_user}:${POSTGRES_PASSWORD:-finanzas_pass_dev}@postgres:5432/${POSTGRES_DB:-finanzas_db}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_production_minimum_64_characters_long_xxxxxxxxxx}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production_minimum_64_characters_long_xxxxxxxxxxx}
      PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@finanzas.app}
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finanzas-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  postgres_data:
